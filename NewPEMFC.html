          center/contain no-repeat;
        overflow: hidden;
        border: 1px solid #444;
      }
      .panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      button {
        padding: 8px 12px;
        margin: 0 4px;
      }
      .p {
        position: absolute;
        pointer-events: none;
      }
      .flash-text {
        font-size: 1rem;
        background-color: #0b1220;
        padding: 0.25rem;
        border-radius: 5px;
      }
      .proton {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 0 8px white;
      }
      .electron {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #55b7ff;
        box-shadow: 0 0 8px #55b7ff;
      }
      .label {
        position: absolute;
        background: rgba(0, 0, 0, 0.65);
        padding: 6px 10px;
        border-radius: 6px;
      }
      .info {
        max-width: 1400px;
        margin: auto;
        line-height: 1.5;
      }

      a {
        color: #ffffff;
        cursor: pointer;
      }

  </head>
  <body>
    <div class="container">
      <div class="panel">
        <h2>PEM Fuel Cell</h2>
        <button onclick="running = !running">Start / Pause</button>

        <nav>
          <a href="./index.html">Zinkbromid-Elektrolyse</a>
          <a href="./lokalelement.html">Korrosion</a>
          <a href="./oxinred.html">RedOx</a>
        </nav>
      </div>

      <div id="scene">
        <div class="label rxn" style="left: 17%; top: 16%">
          Anode: H₂ → 2H⁺ + 2e⁻
        </div>
        <div class="label rxn" style="left: 60%; top: 16%">
          Kathode: O₂ + 4H⁺ + 4e⁻ → 2H₂O
        </div>
      </div>

      <div class="info">
        Wasserstoffoxidation an der Anode, Protonentransport durch die PEM,
        Elektronentransport durch den äußeren Stromkreis, Reduktion von
        Sauerstoff an der Kathode und Wasserbildung.
      </div>
    </div>

    <script>
      const scene = document.getElementById('scene')
      let running = true

      function addMol(html, x, y) {
        const d = document.createElement('div')
        d.className = 'p'
        d.innerHTML = html
        d.style.left = x + '%'
        d.style.top = y + '%'
        scene.appendChild(d)
        return d
      }

      function move(el, x1, y1, x2, y2, duration, done) {
        let start = null
        function frame(t) {
          if (!start) start = t
          if (!running) {
            requestAnimationFrame(frame)
            return
          }
          const p = Math.min((t - start) / duration, 1)
          el.style.left = x1 + (x2 - x1) * p + '%'
          el.style.top = y1 + (y2 - y1) * p + '%'
          if (p < 1) requestAnimationFrame(frame)
          else if (done) done(el)
        }
        requestAnimationFrame(frame)
      }

      function flash(x, y, text, color) {
        const d = document.createElement('div')
        d.className = 'p flash-text'
        d.style.left = x + '%'
        d.style.top = y + '%'
        d.style.color = color
        d.style.fontWeight = 'bold'
        d.innerText = text
        scene.appendChild(d)
        setTimeout(() => d.remove(), 1500)
      }

      function proton() {
        const p = document.createElement('div')
        p.className = 'p proton'
        scene.appendChild(p)
        const y = 32 + Math.random() * 30
        move(p, 30, y, 69, y, 3500, e => e.remove())
      }

      function electron() {
        const e = document.createElement('div')
        e.className = 'p electron'
        scene.appendChild(e)
        let start = null
        function f(t) {
          if (!start) start = t
          if (!running) {
            requestAnimationFrame(f)
            return
          }
          const p = Math.min((t - start) / 3200, 1)
          e.style.left = 30 + 42 * p + '%'
          e.style.top = 8 - 6 * Math.sin(Math.PI * p) + '%'
          if (p < 1) requestAnimationFrame(f)
          else e.remove()
        }
        requestAnimationFrame(f)
      }

      function spawnH2() {
        const y = 28 + Math.random() * 35
        const h2 =
          '<div style="position:absolute;width:20px;height:20px;border-radius:50%;background:white"></div><div style="position:absolute;left:10px;width:20px;height:20px;border-radius:50%;background:white"></div>'
        const m = addMol(h2, 5, y)
        move(m, 5, y, 24, 45, 3500, e => {
          e.remove()
          flash(26, 45, 'H₂ → 2H⁺ + 2e⁻', '#2cf1f1')
          proton()
          proton()
          electron()
          electron()
        })
      }

      function oxygen() {
        const y = 25 + Math.random() * 35
        const o2 =
          '<div style="position:absolute;width:20px;height:20px;border-radius:50%;background:red"></div><div style="position:absolute;left:12px;width:20px;height:20px;border-radius:50%;background:red"></div>'
        const m = addMol(o2, 92, y)
        move(m, 92, y, 77, 45, 3500, e => e.remove())
      }

      function water() {
        flash(73, 45, 'Wasserbildung', '#2cf1f1')
        const h2o =
          '<div style="position:absolute;left:8px;top:10px;width:25px;height:25px;border-radius:50%;background:red"></div><div style="position:absolute;left:-4px;width:20px;height:20px;border-radius:50%;background:white"></div><div style="position:absolute;left:25px;width:20px;height:20px;border-radius:50%;background:white"></div>'
        const m = addMol(h2o, 72, 46)
        move(m, 72, 46, 95, 55, 4500, e => e.remove())
      }

      setInterval(() => {
        if (running) spawnH2()
      }, 1800)
      setInterval(() => {
        if (running) oxygen()
      }, 2600)
      setInterval(() => {
        if (running) water()
      }, 3200)
    </script>
  </body>
</html>
